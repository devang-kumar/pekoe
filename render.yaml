# Render Deployment Configuration (Blueprint)
# This file allows you to deploy the entire PëKœ app with one click on Render.

services:
  - type: web
    name: pekoe-app
    env: node
    plan: free # Change to 'starter' if you want persistent storage
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
    

